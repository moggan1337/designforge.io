name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build Next.js application
        run: npm run build

  # NOTE: No test step - package.json has no test script configured.
  # Add "test": "jest" or similar to enable testing.

  failure-notification:
    needs: lint-and-build
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify on failure
        run: |
          echo "::notice::CI workflow failed. Check the workflow run at https://github.com/${{ github.repository }}/actions"
          echo "::warning::Please review the failed job logs above."

  badge:
    runs-on: ubuntu-latest
    outputs:
      badge: ${{ steps.badge.outputs.badge }}
    steps:
      - id: badge
        run: |
          echo "badge=[![CI](https://github.com/${{ github.repository }}/actions/workflows/ci.yml/badge.svg)](https://github.com/${{ github.repository }}/actions)" >> $GITHUB_OUTPUT

  # Artifact with badge markdown for easy copy-paste
  publish-badge:
    needs: badge
    runs-on: ubuntu-latest
    steps:
      - name: Generate badge artifact
        run: |
          echo "${{ needs.badge.outputs.badge }}" > badge.md
          echo "Badge ready. Add this to your README:"
          cat badge.md

      - name: Upload badge artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-badge
          path: badge.md
          retention-days: 30
